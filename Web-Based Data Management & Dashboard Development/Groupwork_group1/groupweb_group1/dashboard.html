<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard - Apartment KhunPa</title>

<!-- ✅ CSS Framework -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">

<style>
body, html {
  margin: 0;
  padding: 0;
  font-family: 'Roboto', sans-serif;
  background: #f5f7fa;
}
.navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  background: #00796b;
  padding: 15px 30px;
  display: flex;
  justify-content: center;
  gap: 20px;
  z-index: 1000;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}
.navbar a {
  color: white;
  text-decoration: none;
  font-weight: 600;
  font-size: 18px;
  transition: all 0.3s;
}
.navbar a:hover, .navbar a.active {
  color: #b2dfdb;
  transform: scale(1.1);
}

/* Layout */
.container {
  margin-top: 110px;
  margin-bottom: 60px;
}

/* Card + KPI Style */
.card {
  border-radius: 15px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  border: none;
}
.stat-card .num {
  font-size: 1.9rem;
  font-weight: 700;
  color: #00796b;
}
.card-header {
  background: #00796b;
  color: white;
  font-weight: 600;
}

/* Spinner */
.spinner {
  min-height: 140px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Table */
.table thead {
  background: #00796b;
  color: white;
}
</style>

<script>const BASE = "/groupweb_group1";</script>
</head>
<body>

<!-- ✅ Navbar -->
<div class="navbar">
     <a href="index.html" class="active"><i class="fas fa-home"></i> Home</a>
  <a href="room.html"><i class="fas fa-building"></i> Room</a>
  <a href="customer.html"><i class="fas fa-user"></i> Customer</a>
   <a href="rate.html"><i class="fas fa-money-bill-wave"></i> Rate</a>
  <a href="bill.html"><i class="fas fa-file-invoice-dollar"></i> Bill</a>
  <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
</div>

<!-- ✅ เนื้อหาหลัก -->
<div class="container pb-5">

  <!-- [1] ตัวกรองห้อง -->
  <div class="row g-3 mb-3">
    <div class="col-md-6 col-lg-4">
      <label class="form-label mb-1 fw-bold text-secondary">กรองตามห้องพัก</label>
      <select id="filterRoom" class="form-select">
        <option value="">— ทุกห้อง —</option>
      </select>
    </div>
  </div>

  <!-- [2] KPI -->
  <div class="row g-3 mb-4">
    <div class="col-md-4">
      <div class="card stat-card"><div class="card-body text-center">
        <div class="text-muted">จำนวนห้องทั้งหมด</div>
        <div id="kpiRooms" class="num">—</div>
      </div></div>
    </div>
    <div class="col-md-4">
      <div class="card stat-card"><div class="card-body text-center">
        <div class="text-muted">จำนวนผู้เช่า</div>
        <div id="kpiCustomers" class="num">—</div>
      </div></div>
    </div>
    <div class="col-md-4">
      <div class="card stat-card"><div class="card-body text-center">
        <div class="text-muted">ยอดบิลรวม (บาท)</div>
        <div id="kpiTotal" class="num">—</div>
      </div></div>
    </div>
  </div>

  <!-- [3] กราฟ -->
  <div class="row g-3 mb-4">
    <div class="col-lg-7">
      <div class="card shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span>ยอดบิล</span>
          <button id="btnClearFilter" class="btn btn-sm btn-light d-none">ล้างตัวกรอง</button>
        </div>
        <div class="card-body">
          <div id="wrapBills" class="spinner"><div class="spinner-border text-success" role="status"></div></div>
          <canvas id="chartBills" class="d-none"></canvas>
        </div>
      </div>
    </div>

    <div class="col-lg-5">
      <div class="card shadow-sm">
        <div class="card-header">สัดส่วนสถานะห้อง</div>
        <div class="card-body">
          <div id="wrapStatus" class="spinner"><div class="spinner-border text-success" role="status"></div></div>
          <canvas id="chartStatus" class="d-none"></canvas>
        </div>
      </div>
    </div>
  </div>

  <!-- [4] ตารางผู้เช่า -->
  <div class="card shadow-sm">
    <div class="card-header">ข้อมูลผู้เช่า</div>
    <div class="card-body">
      <div class="table-responsive">
        <table id="tblCustomers" class="table table-striped table-bordered w-100">
          <thead>
            <tr>
              <th>รหัสลูกค้า</th>
              <th>ห้อง</th>
              <th>ยอดบิลล่าสุด (บาท)</th>
            </tr>
          </thead>
          <tbody><tr><td colspan="3" class="text-center">กำลังโหลด...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- ✅ JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

<script>
(() => {
  const qs = s => document.querySelector(s);
  let selectedRoom = '';
  let chartBills = null, chartStatus = null;

  // โหลดรายชื่อห้อง
  async function fillRoomDropdown() {
    try {
      const r = await fetch(`${BASE}/php_file/get_rooms.php`);
      const arr = await r.json();
      const sel = qs('#filterRoom');
      arr.forEach(room => sel.add(new Option('ห้อง ' + room, room)));
    } catch (e) { console.error('load room error', e); }
  }

  // โหลด KPI
  async function loadKPIs(room='') {
    try {
      const url = new URL(`${BASE}/php_file/get_metrics.php`, location.origin);
      if (room) url.searchParams.set('room', room);
      const res = await fetch(url);
      const m = await res.json();
      qs('#kpiRooms').textContent = m.rooms ?? 0;
      qs('#kpiCustomers').textContent = m.customers ?? 0;
      qs('#kpiTotal').textContent = (m.total ?? 0).toLocaleString();
    } catch (e) { console.error('KPI load error', e); }
  }
  async function loadBillsChart() {
  try {
    const url = new URL(`${BASE}/php_file/get_bills_table.php`, location.origin);
    const r = await fetch(url);
    const data = await r.json();

    // ตรวจสอบหากไม่มีข้อมูล
    if (!data.electric.length) {
      qs('#wrapBills').innerHTML = 'ไม่มีข้อมูลบิล';
      return;
    }

    // ซ่อน Spinner และแสดงกราฟ
    qs('#wrapBills').classList.add('d-none');
    const ctx = qs('#chartBills');
    ctx.classList.remove('d-none');

    // สร้างกราฟโดยใช้ข้อมูลที่ได้รับจาก PHP
    const labels = data.electric.map((_, index) => `บิล ${index + 1}`);

    const chartData = {
      labels: labels,
      datasets: [
        {
          label: 'ค่าน้ำ',
          data: data.water,
          backgroundColor: '#26a69a',
          borderColor: '#00796b',
          borderWidth: 1
        },
        {
          label: 'ค่าไฟ',
          data: data.electric,
          backgroundColor: '#ff7043',
          borderColor: '#ff5722',
          borderWidth: 1
        },
        {
          label: 'ค่ารวม',
          data: data.total,
          backgroundColor: '#b2dfdb',
          borderColor: '#00796b',
          borderWidth: 1
        }
      ]
    };

    // สร้างกราฟ
    if (chartBills) chartBills.destroy();
    chartBills = new Chart(ctx, {
      type: 'line', // เปลี่ยนเป็น Line Chart
      data: chartData,
      options: {
        responsive: true,
        plugins: {
          legend: {
            position: 'top'
          },
          tooltip: {
            callbacks: {
              label: function(tooltipItem) {
                return tooltipItem.dataset.label + ': ' + tooltipItem.raw.toLocaleString() + ' บาท';
              }
            }
          }
        },
        scales: {
          x: {
            title: {
              display: true,
              text: 'Bill ID'
            }
          },
          y: {
            title: {
              display: true,
              text: 'Amount (Baht)'
            }
          }
        }
      }
    });

  } catch (e) {
    console.error('Error loading bills chart:', e);
  }
}

  // โหลดกราฟสถานะห้อง
  async function loadStatusChart() {
    try {
      const r = await fetch(`${BASE}/php_file/get_room_status_dist.php`);
      const rows = await r.json();

      if (!rows.length) {
        qs('#wrapStatus').innerHTML = 'ไม่มีข้อมูลสถานะ';
        return;
      }

      qs('#wrapStatus').classList.add('d-none');
      const ctx = qs('#chartStatus');
      ctx.classList.remove('d-none');
      const labels = rows.map(x => x.status);
      const data = rows.map(x => x.cnt);

      if (chartStatus) chartStatus.destroy();
      chartStatus = new Chart(ctx, {
        type: 'doughnut',
        data: { labels, datasets: [{ data, backgroundColor: ['#00796b','#26a69a','#b2dfdb'] }] },
        options: { plugins: { legend: { position: 'bottom' } } }
      });
    } catch (e) { console.error('status chart error', e); }
  }

  // โหลดตารางผู้เช่า
  async function loadCustomersTable(room='') {
    try {
      const url = new URL(`${BASE}/php_file/get_customers_table.php`, location.origin);
      if (room) url.searchParams.set('room', room);
      const r = await fetch(url);
      const rows = await r.json();

      const data = rows.map(r => ({
        CustomerID: r.CustomerID,
        Room_Number: r.Room_Number,
        Total_Bill: r.Total_Bill
      }));

      const jq = window.jQuery;
      jq(function(){
        if (jq.fn.dataTable.isDataTable('#tblCustomers')) {
          jq('#tblCustomers').DataTable().clear().rows.add(data).draw();
        } else {
          jq('#tblCustomers').DataTable({
            data,
            columns: [
              { data: 'CustomerID' },
              { data: 'Room_Number' },
              { data: 'Total_Bill' }
            ],
            pageLength: 10
          });
        }
      });
    } catch (e) { console.error('table error', e); }
  }

  // โหลดทั้งหมด
  async function applyFilter() {
    await loadKPIs(selectedRoom);
    await loadBillsChart(selectedRoom);
    await loadStatusChart();
    await loadCustomersTable(selectedRoom);
  }

  qs('#filterRoom').addEventListener('change', e => {
    selectedRoom = e.target.value;
    applyFilter();
  });

  fillRoomDropdown();
  applyFilter();
})();
</script>
</body>
</html>
